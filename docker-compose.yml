version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      # Montar certs en desarrollo local — NUNCA en repo
      - ./certs:/etc/pos/certs:ro
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: posarca
      POSTGRES_USER: posarca
      POSTGRES_PASSWORD: posarca_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
