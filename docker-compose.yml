version: "3.9"

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_PROXY_TARGET=http://backend:8080
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://posarca:posarca_dev@postgres:5432/posarca?sslmode=disable
    volumes:
      # Montar certs en desarrollo local — NUNCA en repo
      - ./certs:/app/certs:ro
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: posarca
      POSTGRES_USER: posarca
      POSTGRES_PASSWORD: posarca_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U posarca -d posarca"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
